<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <filter id="paper4" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="12" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComponentTransfer in="b">
        <feFuncR type="linear" slope="0.04" intercept="0.95"/>
        <feFuncG type="linear" slope="0.03" intercept="0.94"/>
        <feFuncB type="linear" slope="0.03" intercept="0.91"/>
      </feComponentTransfer>
    </filter>
    <filter id="rough4" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="turbulence" baseFrequency="0.030 0.015" numOctaves="3" seed="29" result="r"/>
      <feDisplacementMap in="SourceGraphic" in2="r" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="ink4" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="15" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="240" height="240" fill="#FAFAF6" filter="url(#paper4)"/>
  <!-- 우아한 이중 링 (얇은) -->
  <g filter="url(#rough4)">
    <circle cx="120" cy="120" r="109" fill="none" stroke="#8B0000" stroke-width="3"/>
    <circle cx="120" cy="120" r="101" fill="none" stroke="#8B0000" stroke-width="1.2"/>
    <circle cx="120" cy="120" r="97" fill="none" stroke="#8B0000" stroke-width="0.5" opacity="0.5"/>
  </g>
  <!-- 한자 3글자 굽이형: 우상단 / 좌상단 / 하단 중앙 -->
  <g filter="url(#ink4)" font-family="serif" font-weight="400" fill="#8B0000" text-anchor="middle" dominant-baseline="central">
    <text x="164" y="86" font-size="44">金</text>
    <text x="76" y="86" font-size="44">潤</text>
    <text x="120" y="157" font-size="44">瑟</text>
  </g>
  <text x="120" y="228" text-anchor="middle" font-size="11" fill="#8B0000" opacity="0.55" font-family="sans-serif" letter-spacing="1">한자 · 우아한 굽이형 · 3자</text>
</svg>
