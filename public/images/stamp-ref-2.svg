<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <filter id="paper2" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="5" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComponentTransfer in="b">
        <feFuncR type="linear" slope="0.04" intercept="0.95"/>
        <feFuncG type="linear" slope="0.03" intercept="0.94"/>
        <feFuncB type="linear" slope="0.03" intercept="0.91"/>
      </feComponentTransfer>
    </filter>
    <filter id="rough2" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="turbulence" baseFrequency="0.028 0.016" numOctaves="3" seed="13" result="r"/>
      <feDisplacementMap in="SourceGraphic" in2="r" scale="4.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="ink2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" seed="17" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="240" height="240" fill="#FAFAF6" filter="url(#paper2)"/>
  <g filter="url(#rough2)">
    <circle cx="120" cy="120" r="109" fill="none" stroke="#8B0000" stroke-width="4.5"/>
    <circle cx="120" cy="120" r="100" fill="none" stroke="#8B0000" stroke-width="1.2"/>
  </g>
  <!-- 한자 4글자 2×2 굵은 전서체 -->
  <g filter="url(#ink2)" font-family="serif" font-weight="700" fill="#8B0000" text-anchor="middle" dominant-baseline="central">
    <text x="78" y="91" font-size="50">金</text>
    <text x="162" y="91" font-size="50">潤</text>
    <text x="78" y="151" font-size="50">瑟</text>
    <text x="162" y="151" font-size="50">印</text>
  </g>
  <text x="120" y="228" text-anchor="middle" font-size="11" fill="#8B0000" opacity="0.55" font-family="sans-serif" letter-spacing="1">한자 · 굵은 전서체 · 4자</text>
</svg>
