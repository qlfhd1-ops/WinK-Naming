<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <filter id="paper3" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="8" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComponentTransfer in="b">
        <feFuncR type="linear" slope="0.04" intercept="0.95"/>
        <feFuncG type="linear" slope="0.03" intercept="0.94"/>
        <feFuncB type="linear" slope="0.03" intercept="0.91"/>
      </feComponentTransfer>
    </filter>
    <filter id="rough3" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="turbulence" baseFrequency="0.034 0.020" numOctaves="3" seed="21" result="r"/>
      <feDisplacementMap in="SourceGraphic" in2="r" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="ink3" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.80" numOctaves="4" seed="11" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="1.3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="clip3">
      <circle cx="120" cy="120" r="100"/>
    </clipPath>
  </defs>
  <rect width="240" height="240" fill="#FAFAF6" filter="url(#paper3)"/>
  <g filter="url(#rough3)">
    <circle cx="120" cy="120" r="109" fill="none" stroke="#8B0000" stroke-width="3.5"/>
    <circle cx="120" cy="120" r="100" fill="none" stroke="#8B0000" stroke-width="1"/>
  </g>
  <!-- T자형 구분선 -->
  <g clip-path="url(#clip3)" filter="url(#rough3)">
    <line x1="22" y1="120" x2="218" y2="120" stroke="#8B0000" stroke-width="1" opacity="0.8"/>
  </g>
  <!-- 한글 3글자 T자형: 상단 1 / 하단 2 (가는 필기체 느낌) -->
  <g filter="url(#ink3)" font-family="cursive" font-weight="400" fill="#8B0000" text-anchor="middle" dominant-baseline="central">
    <text x="120" y="82" font-size="46">김</text>
    <text x="76" y="152" font-size="46">윤</text>
    <text x="164" y="152" font-size="46">슬</text>
  </g>
  <text x="120" y="228" text-anchor="middle" font-size="11" fill="#8B0000" opacity="0.55" font-family="sans-serif" letter-spacing="1">한글 · 가는 필기체 · T자형 · 3자</text>
</svg>
