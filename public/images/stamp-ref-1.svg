<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <filter id="paper1" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="3" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComponentTransfer in="b">
        <feFuncR type="linear" slope="0.04" intercept="0.95"/>
        <feFuncG type="linear" slope="0.03" intercept="0.94"/>
        <feFuncB type="linear" slope="0.03" intercept="0.91"/>
      </feComponentTransfer>
    </filter>
    <filter id="rough1" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="turbulence" baseFrequency="0.032 0.018" numOctaves="3" seed="7" result="r"/>
      <feDisplacementMap in="SourceGraphic" in2="r" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="ink1" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="9" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="1.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- 종이 배경 -->
  <rect width="240" height="240" fill="#FAFAF6" filter="url(#paper1)"/>
  <!-- 이중 링 -->
  <g filter="url(#rough1)">
    <circle cx="120" cy="120" r="109" fill="none" stroke="#8B0000" stroke-width="5.5"/>
    <circle cx="120" cy="120" r="99" fill="none" stroke="#8B0000" stroke-width="1.4"/>
  </g>
  <!-- 한글 4글자 2×2 초굵은 전서체 -->
  <g filter="url(#ink1)" font-family="serif" font-weight="900" fill="#8B0000" text-anchor="middle" dominant-baseline="central">
    <text x="78" y="92" font-size="52" letter-spacing="-2">김</text>
    <text x="162" y="92" font-size="52" letter-spacing="-2">윤</text>
    <text x="78" y="152" font-size="52" letter-spacing="-2">슬</text>
    <text x="162" y="152" font-size="52" letter-spacing="-2">인</text>
  </g>
  <!-- 라벨 -->
  <text x="120" y="228" text-anchor="middle" font-size="11" fill="#8B0000" opacity="0.55" font-family="sans-serif" letter-spacing="1">한글 · 초굵은 전서체 · 4자</text>
</svg>
